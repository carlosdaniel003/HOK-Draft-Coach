name: Temporary fix active allied slot

on:
  push:
    branches:
      - feat/backend-draft-engine
    paths:
      - .github/workflows/temp-fix-active-allied-slot.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/backend-draft-engine
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Correct active allied slot state
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          service_path = Path('src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickService.java')
          service = service_path.read_text(encoding='utf-8')
          service, count = re.subn(
              r'        boolean ehMinhaVez = rodadaAtual\.lado\(\) == request\.meuLado\(\)\n\s*&& rodadaAtual\.ordens\(\)\.contains\(request\.minhaOrdem\(\)\);\n\s*boolean vezAliada = rodadaAtual\.lado\(\) == request\.meuLado\(\);',
              '        boolean vezAliada = rodadaAtual.lado() == request.meuLado();\n        boolean ehMinhaVez = vezAliada && recomendacaoParaUsuario;',
              service,
              count=1,
          )
          if count != 1:
              raise SystemExit(f'Estado do slot aliado: esperado 1 bloco, encontrado {count}')
          service_path.write_text(service, encoding='utf-8')

          test_path = Path('src/test/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickServiceTest.java')
          test = test_path.read_text(encoding='utf-8')
          old_name = '    void deveRecomendarHeroiQuandoForMinhaVez() {'
          new_name = '    void devePriorizarPrimeiroSlotAliadoAbertoNaRodadaDupla() {'
          if test.count(old_name) != 1:
              raise SystemExit('Nome do teste não encontrado')
          test = test.replace(old_name, new_name, 1)

          old_assertions = '''        assertEquals("MINHA_VEZ", resposta.estadoDraft());
              assertTrue(resposta.ehMinhaVez());
              assertEquals("B3", resposta.meuSlot());
          '''
          new_assertions = '''        assertEquals("VEZ_ALIADA", resposta.estadoDraft());
              assertFalse(resposta.ehMinhaVez());
              assertEquals("B3", resposta.meuSlot());
              assertTrue(resposta.mensagem().contains("B2"));
          '''
          if test.count(old_assertions) != 1:
              raise SystemExit('Asserções da rodada dupla não encontradas')
          test = test.replace(old_assertions, new_assertions, 1)
          test_path.write_text(test, encoding='utf-8')
          PY

      - name: Run Maven tests
        run: mvn --batch-mode --no-transfer-progress clean test

      - name: Publish correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm \
            .github/workflows/temp-fix-active-allied-slot.yml \
            .github/workflows/temp-refine-live-draft.yml
          git add \
            src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickService.java \
            src/test/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickServiceTest.java
          git commit -m "fix: align allied recommendation with active slot"
          git push origin HEAD:feat/backend-draft-engine

name: Temporary diagnose live draft v2

on:
  push:
    branches:
      - feat/backend-draft-engine
    paths:
      - .github/workflows/temp-diagnose-v2.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/backend-draft-engine
          fetch-depth: 0
      - name: Diagnose transformations
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          report = []

          def test_sub(text, pattern, label, flags=0):
              count = len(re.findall(pattern, text, flags))
              report.append(f'{label}={count}')

          service = Path('src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickService.java').read_text(encoding='utf-8')
          dna = Path('src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickDnaService.java').read_text(encoding='utf-8')

          test_sub(service, r'\n        if \(slotJaPreenchido\(request\)\) \{.*?\n        \}\n\n        EstadoRodada rodadaAtual', 'service_slot', re.S)
          test_sub(service, r'(        if \(rodadaAtual == null\) \{.*?        \}\n)\n        InferenciaEquipeResponse aliados = equipe\(', 'service_insert', re.S)
          test_sub(service, r'(inimigosSemFuncao,\n)\s*request\.funcoesPreferidas\(\)(\n\s*\)\))', 'service_funcoes')
          test_sub(service, r'        boolean ehMinhaVez = rodadaAtual\.lado\(\) == request\.meuLado\(\).*?        return new RecomendacaoProximoPickResponse\(\n            VERSAO_MOTOR,\n            ehMinhaVez \? "MINHA_VEZ" : "PLANEJAMENTO",', 'service_state', re.S)
          report.append(f"service_helper={service.count('    private boolean slotJaPreenchido(\\n')}")

          test_sub(dna, r'        List<String> aliados = nomes\(picksAliados\(request\)\);.*?        RecomendacaoProximoPickResponse base = recomendacaoBase\.recomendar\(\n            request\n        \);', 'dna_start', re.S)
          test_sub(dna, r'dnaPorRota,\n\s*request\n\s*\)\)', 'dna_adjust')
          test_sub(dna, r'        String mensagem = switch \(base\.estadoDraft\(\)\) \{.*?        \};', 'dna_message', re.S)
          report.append(f"dna_helper={dna.count('    private List<PickSemFuncaoRequest> picksAliados(\\n')}")

          Path('live-draft-v2-diagnostic.txt').write_text('\n'.join(report) + '\n', encoding='utf-8')
          PY
      - name: Publish diagnostic
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/temp-diagnose-v2.yml
          git add live-draft-v2-diagnostic.txt
          git commit -m "chore: record structural patch diagnostics"
          git push origin HEAD:feat/backend-draft-engine

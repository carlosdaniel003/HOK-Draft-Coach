name: Temporary diagnose complete projection

on:
  push:
    branches:
      - feat/backend-draft-engine
    paths:
      - .github/workflows/temp-diagnose-complete-projection.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/backend-draft-engine
          fetch-depth: 0

      - name: Execute patch script diagnostically
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/temp-complete-projection-flow.yml').read_text(encoding='utf-8')
          start = workflow.index("          python3 - <<'PY'\n") + len("          python3 - <<'PY'\n")
          end = workflow.index("          PY\n", start)
          lines = workflow[start:end].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          Path('/tmp/complete-projection.py').write_text(script, encoding='utf-8')
          PY
          set +e
          python3 /tmp/complete-projection.py > /tmp/complete-projection-output.txt 2>&1
          status=$?
          echo "status=$status" >> /tmp/complete-projection-output.txt
          git reset --hard HEAD
          cp /tmp/complete-projection-output.txt complete-projection-output.txt

      - name: Publish diagnostic
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/temp-diagnose-complete-projection.yml
          git add complete-projection-output.txt
          git commit -m "chore: capture first-pick projection patch output"
          git push origin HEAD:feat/backend-draft-engine

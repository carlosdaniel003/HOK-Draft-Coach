name: Temporary enforce user role

on:
  push:
    branches:
      - feat/backend-draft-engine
    paths:
      - .github/workflows/temp-enforce-user-role.yml

permissions:
  contents: write

jobs:
  patch-test-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/backend-draft-engine
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Aplicar restrição obrigatória de função
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: esperado 1 bloco, encontrado {count}")
              return text.replace(old, new, 1)

          service_path = Path(
              "src/main/java/br/com/carlosdaniel/hokdraftcoach/service/"
              "RecomendacaoProximoPickService.java"
          )
          service = service_path.read_text(encoding="utf-8")

          old_candidates = '''        List<RecomendacaoPickResponse> recomendacoes = heroiService
              .listarTodos()
              .stream()
              .filter(heroi -> !indisponiveis.contains(heroi.getId()))
              .map(heroi -> avaliarCandidato('''
          new_candidates = '''        List<RecomendacaoPickResponse> recomendacoes = heroiService
              .listarTodos()
              .stream()
              .filter(heroi -> !indisponiveis.contains(heroi.getId()))
              .filter(heroi -> funcoesAlvo.isEmpty()
                  || heroi.getRotasPossiveis().stream()
                      .anyMatch(funcoesAlvo::contains))
              .map(heroi -> avaliarCandidato('''
          service = replace_once(
              service,
              old_candidates,
              new_candidates,
              "Filtro de candidatos pela função do usuário"
          )

          old_routes = '''            List<Rota> rotasValidas = candidato.getRotasPossiveis()
                  .stream()
                  .filter(hipoteseAliada.rotasAbertas()::contains)
                  .toList();'''
          new_routes = '''            List<Rota> rotasValidas = candidato.getRotasPossiveis()
                  .stream()
                  .filter(hipoteseAliada.rotasAbertas()::contains)
                  .filter(rota -> funcoesPreferidas.isEmpty()
                      || funcoesPreferidas.contains(rota))
                  .toList();'''
          service = replace_once(
              service,
              old_routes,
              new_routes,
              "Restrição das rotas avaliadas"
          )
          service_path.write_text(service, encoding="utf-8")

          test_path = Path(
              "src/test/java/br/com/carlosdaniel/hokdraftcoach/service/"
              "RecomendacaoProximoPickServiceTest.java"
          )
          test = test_path.read_text(encoding="utf-8")
          marker = '''    @Test
      void deveAguardarConclusaoDosBans() {'''
          test_block = '''    @Test
      void deveRestringirRecomendacoesAFuncaoDoUsuario() {
          RecomendacaoProximoPickRequest request = new RecomendacaoProximoPickRequest(
              LadoDraft.AZUL,
              1,
              List.of(1L, 2L, 3L),
              List.of(4L, 5L, 6L),
              List.of(),
              List.of(),
              List.of(Rota.FARM_LANE)
          );

          RecomendacaoProximoPickResponse resposta = service.recomendar(request);

          assertEquals("MINHA_VEZ", resposta.estadoDraft());
          assertNotNull(resposta.recomendacaoPrincipal());
          assertTrue(
              java.util.stream.Stream.concat(
                  java.util.stream.Stream.of(resposta.recomendacaoPrincipal()),
                  resposta.alternativas().stream()
              ).allMatch(recomendacao ->
                  !recomendacao.rotasRecomendadas().isEmpty()
                      && recomendacao.rotasRecomendadas().stream()
                          .allMatch(Rota.FARM_LANE::equals)
              )
          );
      }

      @Test
      void deveAguardarConclusaoDosBans() {'''
          test = replace_once(
              test,
              marker,
              test_block,
              "Teste unitário de função obrigatória"
          )
          test_path.write_text(test, encoding="utf-8")

          integration_path = Path(
              "src/test/java/br/com/carlosdaniel/hokdraftcoach/service/"
              "IntegracaoDnaMotorDraftTest.java"
          )
          integration = integration_path.read_text(encoding="utf-8")
          integration_marker = '''    @Test
      void deveProjetarRespostasInimigasDesdeOPrimeiroPick() {'''
          integration_block = '''    @Test
      void deveManterOpcoesEstrategicasNaFuncaoDoUsuario() {
          RecomendacaoProximoPickRequest request =
              new RecomendacaoProximoPickRequest(
                  LadoDraft.AZUL,
                  1,
                  List.of(1L, 2L, 3L),
                  List.of(4L, 5L, 6L),
                  List.of(),
                  List.of(),
                  List.of(Rota.FARM_LANE)
              );

          RecomendacaoProximoPickResponse resposta =
              proximoPickDnaService.recomendar(request);

          assertEquals("MINHA_VEZ", resposta.estadoDraft());
          assertEquals(3, resposta.opcoesEstrategicas().size());
          assertTrue(resposta.opcoesEstrategicas().stream().allMatch(opcao ->
              !opcao.escolha().rotasRecomendadas().isEmpty()
                  && opcao.escolha().rotasRecomendadas().stream()
                      .allMatch(Rota.FARM_LANE::equals)
          ));
      }

      @Test
      void deveProjetarRespostasInimigasDesdeOPrimeiroPick() {'''
          integration = replace_once(
              integration,
              integration_marker,
              integration_block,
              "Teste integrado de função obrigatória"
          )
          integration_path.write_text(integration, encoding="utf-8")
          PY

      - name: Executar testes Maven
        run: mvn --batch-mode --no-transfer-progress clean test

      - name: Publicar correção validada
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/temp-enforce-user-role.yml
          git add \
            src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickService.java \
            src/test/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickServiceTest.java \
            src/test/java/br/com/carlosdaniel/hokdraftcoach/service/IntegracaoDnaMotorDraftTest.java
          git commit -m "fix: restrict recommendations to user role"
          git push origin HEAD:feat/backend-draft-engine

# trigger: 1

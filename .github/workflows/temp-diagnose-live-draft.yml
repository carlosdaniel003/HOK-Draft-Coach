name: Temporary diagnose live draft patch

on:
  push:
    branches:
      - feat/backend-draft-engine
    paths:
      - .github/workflows/temp-diagnose-live-draft.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/backend-draft-engine
          fetch-depth: 0
      - name: Inspect markers
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          report = []
          service = Path('src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickService.java').read_text(encoding='utf-8')
          dna = Path('src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickDnaService.java').read_text(encoding='utf-8')
          js = Path('src/main/resources/static/js/next-pick.js').read_text(encoding='utf-8')
          css = Path('src/main/resources/static/css/next-pick.css').read_text(encoding='utf-8')
          base_test = Path('src/test/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickServiceTest.java').read_text(encoding='utf-8')
          integration = Path('src/test/java/br/com/carlosdaniel/hokdraftcoach/service/IntegracaoDnaMotorDraftTest.java').read_text(encoding='utf-8')

          checks = {
              'slot_regex': len(re.findall(r'\n        if \(slotJaPreenchido\(request\)\) \{.*?\n        \}\n\n        EstadoRodada rodadaAtual', service, re.S)),
              'rodada_marker': service.count('''        if (rodadaAtual == null) {
              return semRecomendacao(
                  "DRAFT_CONCLUIDO",
                  "Todos os picks já foram registrados.",
                  request,
                  inferencia,
                  null,
                  List.of(),
                  List.of()
              );
          }

          InferenciaEquipeResponse aliados = equipe(
          '''),
              'funcoes_marker': service.count('''                request.funcoesPreferidas()
              ))'''),
              'state_marker': service.count('''        boolean ehMinhaVez = rodadaAtual.lado() == request.meuLado()
              && rodadaAtual.ordens().contains(request.minhaOrdem());
          String mensagem = ehMinhaVez
              ? "É sua vez. A melhor escolha agora é "
                  + principal.heroi() + "."
              : "Planejamento para seu próximo pick: "
                  + principal.heroi()
                  + ". A recomendação pode mudar após os picks anteriores.";

          return new RecomendacaoProximoPickResponse(
              VERSAO_MOTOR,
              ehMinhaVez ? "MINHA_VEZ" : "PLANEJAMENTO",
          '''),
              'helper_marker': service.count('''    private boolean slotJaPreenchido(
              RecomendacaoProximoPickRequest request
          ) {
          '''),
              'dna_start': dna.count('''        List<String> aliados = nomes(picksAliados(request));
          List<String> inimigos = nomes(picksInimigos(request));
          ContextoDraftResponse contexto = segurancaBlindPickService.contexto(
              request
          );
          DiagnosticoComposicaoResponse diagnostico = aliados.isEmpty()
              ? null
              : dnaComposicaoService.diagnosticar(aliados, inimigos);

          RecomendacaoProximoPickResponse base = recomendacaoBase.recomendar(
              request
          );
          '''),
              'dna_adjust': dna.count('''                dnaPorRota,
                  request
              ))'''),
              'dna_message': dna.count('''        String mensagem = switch (base.estadoDraft()) {
              case "MINHA_VEZ" ->
                  "É sua vez. A melhor escolha geral é "
                      + principal.heroi()
                      + "; a resposta também inclui a opção mais segura e a de maior impacto.";
              case "PLANEJAMENTO" ->
                  "Planejamento para " + contexto.momento() + ": "
                      + principal.heroi()
                      + " lidera no geral, com alternativas separadas por segurança e impacto.";
              default -> base.mensagem();
          };
          '''),
              'dna_helper': dna.count('''    private List<PickSemFuncaoRequest> picksAliados(
              RecomendacaoProximoPickRequest request
          ) {
          '''),
              'js_agora': len(re.findall(r'function criarAbaAgora\(resultado\) \{.*?\n\}\n\nfunction obterOpcoesEstrategicas', js, re.S)),
              'js_helper': js.count('function criarAbaComposicao(resultado) {\n'),
              'js_projection': len(re.findall(r'function criarAbaProjecao\(resultado\) \{.*?\n\}\n\nfunction criarBlocoProjecao', js, re.S)),
              'js_block': len(re.findall(r'function criarBlocoProjecao\(opcao, indice\) \{.*?\n\}\n\nfunction registrarEventosDetalhes', js, re.S)),
              'css_status': css.count('.coach-status--planejamento,\n.coach-status--carregando {\n'),
              'css_media': css.count('@media (max-width: 1320px) {\n'),
              'base_state_test': base_test.count('        assertEquals("PLANEJAMENTO", resposta.estadoDraft());'),
              'base_test_marker': base_test.count('''    @Test
              void deveAguardarConclusaoDosBans() {
          '''),
              'integration_marker': integration.count('''    @Test
              void deveProjetarRespostasEOferecerTresOpcoesExplicadas() {
          '''),
          }
          for key, value in checks.items():
              report.append(f'{key}={value}')
          Path('live-draft-marker-report.txt').write_text('\n'.join(report) + '\n', encoding='utf-8')
          PY
      - name: Publish report
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/temp-diagnose-live-draft.yml
          git add live-draft-marker-report.txt
          git commit -m "chore: record live draft patch diagnostics"
          git push origin HEAD:feat/backend-draft-engine

name: Temporary fix live draft indentation

on:
  push:
    branches:
      - feat/backend-draft-engine
    paths:
      - .github/workflows/temp-fix-live-draft-indentation.yml

permissions:
  contents: write

jobs:
  fix-test-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/backend-draft-engine
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Corrigir indentação dos blocos adicionados
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import textwrap

          def bloco(conteudo, espacos):
              texto = textwrap.dedent(conteudo).strip("\n")
              return textwrap.indent(texto, " " * espacos)

          def substituir(texto, padrao, conteudo, rotulo):
              atualizado, quantidade = re.subn(
                  padrao,
                  lambda _: conteudo,
                  texto,
                  count=1,
                  flags=re.S
              )
              if quantidade != 1:
                  raise SystemExit(
                      f"{rotulo}: esperado 1 bloco, encontrado {quantidade}"
                  )
              return atualizado

          service_path = Path(
              "src/main/java/br/com/carlosdaniel/hokdraftcoach/service/"
              "RecomendacaoProximoPickService.java"
          )
          service = service_path.read_text(encoding="utf-8")

          service = substituir(
              service,
              r"\s*Integer ordemAlvoAliada = proximaOrdemAliada\(request\);"
              r".*?InferenciaEquipeResponse aliados = equipe\(",
              bloco(
                  '''
                  Integer ordemAlvoAliada = proximaOrdemAliada(request);
                  if (ordemAlvoAliada == null) {
                      return semRecomendacao(
                          "EQUIPE_ALIADA_COMPLETA",
                          "Os cinco picks da sua equipe já foram registrados.",
                          request,
                          inferencia,
                          rodadaAtual.lado(),
                          rodadaAtual.slots(),
                          List.of(
                              "Acompanhe os picks inimigos restantes e o plano final da composição."
                          )
                      );
                  }

                  boolean recomendacaoParaUsuario = ordemAlvoAliada.equals(
                      request.minhaOrdem()
                  ) && !slotJaPreenchido(request);
                  List<Rota> funcoesAlvo = recomendacaoParaUsuario
                      ? request.funcoesPreferidas()
                      : List.of();

                  InferenciaEquipeResponse aliados = equipe(
                  ''',
                  8
              ),
              "Bloco do próximo aliado"
          )

          service = substituir(
              service,
              r"\s*boolean vezAliada = rodadaAtual\.lado\(\)"
              r" == request\.meuLado\(\);.*?"
              r"return new RecomendacaoProximoPickResponse\(\s*"
              r"VERSAO_MOTOR,\s*estadoDraft,",
              bloco(
                  '''
                  boolean vezAliada = rodadaAtual.lado() == request.meuLado();
                  boolean ehMinhaVez = vezAliada && recomendacaoParaUsuario;
                  String slotAlvo = request.meuLado().prefixoSlot() + ordemAlvoAliada;
                  String estadoDraft = ehMinhaVez
                      ? "MINHA_VEZ"
                      : vezAliada
                          ? "VEZ_ALIADA"
                          : "AGUARDANDO_INIMIGO";
                  String mensagem = switch (estadoDraft) {
                      case "MINHA_VEZ" ->
                          "É sua vez. A melhor escolha agora é "
                              + principal.heroi() + ".";
                      case "VEZ_ALIADA" ->
                          "É a vez da sua equipe. Para " + slotAlvo
                              + ", a melhor escolha é " + principal.heroi() + ".";
                      default ->
                          "O inimigo está escolhendo. Planejamento para "
                              + slotAlvo + ": " + principal.heroi()
                              + " lidera entre as opções aliadas.";
                  };

                  return new RecomendacaoProximoPickResponse(
                      VERSAO_MOTOR,
                      estadoDraft,
                  ''',
                  8
              ),
              "Estado contínuo do draft"
          )

          service = substituir(
              service,
              r"\s*private Integer proximaOrdemAliada\(.*?"
              r"private boolean slotJaPreenchido\(",
              bloco(
                  '''
                  private Integer proximaOrdemAliada(
                      RecomendacaoProximoPickRequest request
                  ) {
                      Map<Integer, Long> preenchidos = mapaPicks(
                          picks(request, request.meuLado())
                      );

                      for (RodadaPick rodada : RODADAS) {
                          if (rodada.lado() != request.meuLado()) {
                              continue;
                          }
                          for (Integer ordem : rodada.ordens()) {
                              if (!preenchidos.containsKey(ordem)) {
                                  return ordem;
                              }
                          }
                      }

                      return null;
                  }

                  private boolean slotJaPreenchido(
                  ''',
                  4
              ),
              "Helper do próximo aliado"
          )
          service_path.write_text(service, encoding="utf-8")

          dna_path = Path(
              "src/main/java/br/com/carlosdaniel/hokdraftcoach/service/"
              "RecomendacaoProximoPickDnaService.java"
          )
          dna = dna_path.read_text(encoding="utf-8")

          dna = substituir(
              dna,
              r"\s*RecomendacaoProximoPickRequest requestAlvo =.*?"
              r"RecomendacaoProximoPickResponse base ="
              r" recomendacaoBase\.recomendar\(\s*request\s*\);",
              bloco(
                  '''
                  RecomendacaoProximoPickRequest requestAlvo =
                      requestParaProximoAliado(request);
                  List<String> aliados = nomes(picksAliados(request));
                  List<String> inimigos = nomes(picksInimigos(request));
                  ContextoDraftResponse contexto = segurancaBlindPickService.contexto(
                      requestAlvo
                  );
                  DiagnosticoComposicaoResponse diagnostico = aliados.isEmpty()
                      ? null
                      : dnaComposicaoService.diagnosticar(aliados, inimigos);

                  RecomendacaoProximoPickResponse base = recomendacaoBase.recomendar(
                      request
                  );
                  ''',
                  8
              ),
              "Contexto do próximo aliado no DNA"
          )

          dna = substituir(
              dna,
              r"\s*String mensagem = switch \(base\.estadoDraft\(\)\) \{"
              r".*?\n\s*\};",
              bloco(
                  '''
                  String mensagem = switch (base.estadoDraft()) {
                      case "MINHA_VEZ" ->
                          "É sua vez. A melhor escolha geral é "
                              + principal.heroi()
                              + "; a resposta também inclui a opção mais segura e a de maior impacto.";
                      case "VEZ_ALIADA" ->
                          "É a vez da sua equipe. " + principal.heroi()
                              + " é a melhor escolha geral para o próximo pick aliado.";
                      case "AGUARDANDO_INIMIGO" ->
                          "O inimigo está escolhendo. " + principal.heroi()
                              + " lidera o planejamento para a próxima resposta aliada.";
                      default -> base.mensagem();
                  };
                  ''',
                  8
              ),
              "Mensagens do orquestrador DNA"
          )

          dna = substituir(
              dna,
              r"\s*private RecomendacaoProximoPickRequest requestParaProximoAliado\("
              r".*?private List<PickSemFuncaoRequest> picksAliados\(",
              bloco(
                  '''
                  private RecomendacaoProximoPickRequest requestParaProximoAliado(
                      RecomendacaoProximoPickRequest request
                  ) {
                      if (request.meuLado() == null) {
                          return request;
                      }

                      List<PickSemFuncaoRequest> aliados = picksAliados(request);
                      Integer ordemAlvo = null;
                      for (int ordem = 1; ordem <= 5; ordem += 1) {
                          int ordemAtual = ordem;
                          boolean preenchido = aliados.stream()
                              .anyMatch(pick -> pick.ordem().equals(ordemAtual));
                          if (!preenchido) {
                              ordemAlvo = ordem;
                              break;
                          }
                      }

                      if (ordemAlvo == null) {
                          return request;
                      }

                      boolean alvoEhUsuario = ordemAlvo.equals(request.minhaOrdem());
                      return new RecomendacaoProximoPickRequest(
                          request.meuLado(),
                          ordemAlvo,
                          request.bansAzul(),
                          request.bansVermelho(),
                          request.picksAzul(),
                          request.picksVermelho(),
                          alvoEhUsuario ? request.funcoesPreferidas() : List.of()
                      );
                  }

                  private List<PickSemFuncaoRequest> picksAliados(
                  ''',
                  4
              ),
              "Helper do contexto DNA"
          )
          dna_path.write_text(dna, encoding="utf-8")

          integration_path = Path(
              "src/test/java/br/com/carlosdaniel/hokdraftcoach/service/"
              "IntegracaoDnaMotorDraftTest.java"
          )
          integration = integration_path.read_text(encoding="utf-8")

          integration = substituir(
              integration,
              r"\s*@Test\s*void "
              r"deveProjetarRespostasInimigasDesdeOPrimeiroPick\(\) \{"
              r".*?\s*@Test\s*void "
              r"deveProjetarRespostasEOferecerTresOpcoesExplicadas\(\) \{",
              bloco(
                  '''
                  @Test
                  void deveProjetarRespostasInimigasDesdeOPrimeiroPick() {
                      RecomendacaoProximoPickRequest request =
                          new RecomendacaoProximoPickRequest(
                              LadoDraft.AZUL,
                              1,
                              List.of(1L, 2L, 3L),
                              List.of(1L, 4L, 5L),
                              List.of(),
                              List.of(),
                              List.of(Rota.ROAMING)
                          );

                      RecomendacaoProximoPickResponse resposta =
                          proximoPickDnaService.recomendar(request);

                      assertEquals("MINHA_VEZ", resposta.estadoDraft());
                      assertNotNull(resposta.recomendacaoPrincipal());
                      assertEquals(3, resposta.opcoesEstrategicas().size());
                      assertTrue(
                          resposta.opcoesEstrategicas().stream().allMatch(
                              opcao -> opcao.projecao() != null
                                  && !opcao.projecao().respostasProvaveis().isEmpty()
                          )
                      );
                  }

                  @Test
                  void deveManterDnaEProjecoesDepoisDoPickDoUsuario() {
                      RecomendacaoProximoPickRequest request =
                          new RecomendacaoProximoPickRequest(
                              LadoDraft.AZUL,
                              1,
                              List.of(1L, 2L, 3L),
                              List.of(1L, 4L, 5L),
                              List.of(new PickSemFuncaoRequest(1, 7L)),
                              List.of(
                                  new PickSemFuncaoRequest(1, 31L),
                                  new PickSemFuncaoRequest(2, 17L)
                              ),
                              List.of(Rota.ROAMING)
                          );

                      RecomendacaoProximoPickResponse resposta =
                          proximoPickDnaService.recomendar(request);

                      assertEquals("VEZ_ALIADA", resposta.estadoDraft());
                      assertNotNull(resposta.recomendacaoPrincipal());
                      assertEquals(3, resposta.opcoesEstrategicas().size());
                      assertTrue(resposta.opcoesEstrategicas().stream().allMatch(
                          opcao -> opcao.projecao() != null
                      ));
                  }

                  @Test
                  void deveProjetarRespostasEOferecerTresOpcoesExplicadas() {
                  ''',
                  4
              ),
              "Testes integrados do fluxo contínuo"
          )
          integration_path.write_text(integration, encoding="utf-8")
          PY

      - name: Validar JavaScript
        run: node --check src/main/resources/static/js/next-pick.js

      - name: Executar testes Maven
        run: mvn --batch-mode --no-transfer-progress clean test

      - name: Publicar correção de indentação
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/temp-fix-live-draft-indentation.yml
          git add \
            src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickService.java \
            src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickDnaService.java \
            src/test/java/br/com/carlosdaniel/hokdraftcoach/service/IntegracaoDnaMotorDraftTest.java
          git commit -m "style: fix live draft block indentation"
          git push origin HEAD:feat/backend-draft-engine

name: Temporary publish minimal live draft

on:
  push:
    branches:
      - feat/backend-draft-engine
    paths:
      - .github/workflows/temp-publish-minimal-live-draft.yml

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/backend-draft-engine
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Preparar transformação validada
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path(
              '.github/workflows/temp-finalize-minimal-live-draft.yml'
          ).read_text(encoding='utf-8')
          marker = "          python3 - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("          PY\n", start)
          lines = workflow[start:end].splitlines()
          prep = '\n'.join(
              line[10:] if line.startswith('          ') else line
              for line in lines
          ) + '\n'
          Path('/tmp/prepare-finalizer.py').write_text(prep, encoding='utf-8')
          PY
          python3 /tmp/prepare-finalizer.py

      - name: Aplicar transformação validada
        shell: bash
        run: |
          git checkout 90eb246be8aca279bd4fbd09242d4cf7fd416051 -- \
            src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickService.java \
            src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickDnaService.java \
            src/test/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickServiceTest.java \
            src/test/java/br/com/carlosdaniel/hokdraftcoach/service/IntegracaoDnaMotorDraftTest.java
          python3 /tmp/minimal-live-draft-fixed.py

      - name: Validar JavaScript
        run: node --check src/main/resources/static/js/next-pick.js

      - name: Executar testes Maven
        run: mvn --batch-mode --no-transfer-progress clean test

      - name: Publicar estado limpo
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm \
            .github/workflows/temp-publish-minimal-live-draft.yml \
            .github/workflows/temp-finalize-minimal-live-draft.yml \
            .github/workflows/temp-minimize-live-draft-diff.yml \
            minimal-diff-output.txt \
            final-minimal-output.txt \
            minimal-tests-output.txt
          git add \
            src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickService.java \
            src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickDnaService.java \
            src/test/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickServiceTest.java \
            src/test/java/br/com/carlosdaniel/hokdraftcoach/service/IntegracaoDnaMotorDraftTest.java
          git commit -m "style: preserve project formatting in live draft changes"
          git push origin HEAD:feat/backend-draft-engine

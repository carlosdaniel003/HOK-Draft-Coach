name: Temporary ranked ban backend fix

on:
  push:
    branches:
      - feat/backend-draft-engine
    paths:
      - .github/workflows/temp-ranked-ban-backend-fix.yml

permissions:
  contents: write

jobs:
  patch-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/backend-draft-engine
          fetch-depth: 0

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Ajustar validação e testes dos bans ranqueados
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          service_path = Path("src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickService.java")
          service = service_path.read_text(encoding="utf-8")

          old_validation = (
          "        Set<Long> bans = new HashSet<>();\n"
          "        validarBans(request.bansAzul(), \"lado azul\", bans);\n"
          "        validarBans(request.bansVermelho(), \"lado vermelho\", bans);\n"
          "\n"
          "        request.picksAzul().forEach(pick -> validarPickBanido(pick, bans));\n"
          "        request.picksVermelho().forEach(pick -> validarPickBanido(pick, bans));\n"
          )
          new_validation = (
          "        Set<Long> bansAzul = validarBans(\n"
          "            request.bansAzul(),\n"
          "            \"lado azul\"\n"
          "        );\n"
          "        Set<Long> bansVermelho = validarBans(\n"
          "            request.bansVermelho(),\n"
          "            \"lado vermelho\"\n"
          "        );\n"
          "        Set<Long> bans = new HashSet<>(bansAzul);\n"
          "        bans.addAll(bansVermelho);\n"
          "\n"
          "        request.picksAzul().forEach(pick -> validarPickBanido(pick, bans));\n"
          "        request.picksVermelho().forEach(pick -> validarPickBanido(pick, bans));\n"
          )

          old_method = (
          "    private void validarBans(\n"
          "        List<Long> ids,\n"
          "        String lado,\n"
          "        Set<Long> bans\n"
          "    ) {\n"
          "        for (Long id : ids) {\n"
          "            if (id == null || id <= 0) {\n"
          "                throw new RegraNegocioException(\n"
          "                    \"Existe um ID inválido nos bans do \" + lado + \".\"\n"
          "                );\n"
          "            }\n"
          "\n"
          "            Heroi heroi = buscarHeroi(id);\n"
          "            if (!bans.add(id)) {\n"
          "                throw new RegraNegocioException(\n"
          "                    \"O herói \" + heroi.getNome()\n"
          "                        + \" foi banido mais de uma vez.\"\n"
          "                );\n"
          "            }\n"
          "        }\n"
          "    }\n"
          )
          new_method = (
          "    private Set<Long> validarBans(\n"
          "        List<Long> ids,\n"
          "        String lado\n"
          "    ) {\n"
          "        Set<Long> bansDoLado = new HashSet<>();\n"
          "\n"
          "        for (Long id : ids) {\n"
          "            if (id == null || id <= 0) {\n"
          "                throw new RegraNegocioException(\n"
          "                    \"Existe um ID inválido nos bans do \" + lado + \".\"\n"
          "                );\n"
          "            }\n"
          "\n"
          "            Heroi heroi = buscarHeroi(id);\n"
          "            if (!bansDoLado.add(id)) {\n"
          "                throw new RegraNegocioException(\n"
          "                    \"O herói \" + heroi.getNome()\n"
          "                        + \" foi banido mais de uma vez pelo \" + lado + \".\"\n"
          "                );\n"
          "            }\n"
          "        }\n"
          "\n"
          "        return bansDoLado;\n"
          "    }\n"
          )

          if service.count(old_validation) != 1:
              raise SystemExit("Bloco de validação dos bans não encontrado exatamente uma vez.")
          if service.count(old_method) != 1:
              raise SystemExit("Método validarBans não encontrado exatamente uma vez.")

          service = service.replace(old_validation, new_validation)
          service = service.replace(old_method, new_method)
          service_path.write_text(service, encoding="utf-8")

          base_test_path = Path("src/test/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickServiceTest.java")
          base_test = base_test_path.read_text(encoding="utf-8")
          base_marker = (
          "    @Test\n"
          "    void deveRejeitarHeroiBanidoNosPicks() {\n"
          )
          base_tests = (
          "    @Test\n"
          "    void devePermitirMesmoHeroiBanidoUmaVezPorEquipe() {\n"
          "        RecomendacaoProximoPickRequest request = new RecomendacaoProximoPickRequest(\n"
          "            LadoDraft.AZUL,\n"
          "            1,\n"
          "            List.of(1L, 2L, 3L),\n"
          "            List.of(1L, 4L, 5L),\n"
          "            List.of(),\n"
          "            List.of(),\n"
          "            List.of(Rota.MID_LANE)\n"
          "        );\n"
          "\n"
          "        RecomendacaoProximoPickResponse resposta = service.recomendar(request);\n"
          "\n"
          "        assertEquals(\"MINHA_VEZ\", resposta.estadoDraft());\n"
          "        assertNotNull(resposta.recomendacaoPrincipal());\n"
          "        assertFalse(resposta.recomendacaoPrincipal().heroiId().equals(1L));\n"
          "    }\n"
          "\n"
          "    @Test\n"
          "    void deveRejeitarBanRepetidoNaMesmaEquipe() {\n"
          "        RecomendacaoProximoPickRequest request = new RecomendacaoProximoPickRequest(\n"
          "            LadoDraft.AZUL,\n"
          "            1,\n"
          "            List.of(1L, 1L, 2L),\n"
          "            List.of(3L, 4L, 5L),\n"
          "            List.of(),\n"
          "            List.of(),\n"
          "            List.of()\n"
          "        );\n"
          "\n"
          "        RegraNegocioException erro = assertThrows(\n"
          "            RegraNegocioException.class,\n"
          "            () -> service.recomendar(request)\n"
          "        );\n"
          "\n"
          "        assertTrue(erro.getMessage().contains(\"lado azul\"));\n"
          "    }\n"
          "\n"
          )

          if base_test.count(base_marker) != 1:
              raise SystemExit("Marcador dos testes do motor base não encontrado exatamente uma vez.")
          base_test = base_test.replace(base_marker, base_tests + base_marker)
          base_test_path.write_text(base_test, encoding="utf-8")

          integration_path = Path("src/test/java/br/com/carlosdaniel/hokdraftcoach/service/IntegracaoDnaMotorDraftTest.java")
          integration = integration_path.read_text(encoding="utf-8")
          old_bans = (
          "                List.of(1L, 2L, 3L),\n"
          "                List.of(4L, 5L, 6L),\n"
          )
          new_bans = (
          "                List.of(1L, 2L, 3L),\n"
          "                List.of(1L, 4L, 5L),\n"
          )

          if integration.count(old_bans) != 1:
              raise SystemExit("Cenário de integração dos bans não encontrado exatamente uma vez.")
          integration = integration.replace(old_bans, new_bans)
          integration_path.write_text(integration, encoding="utf-8")
          PY

      - name: Executar testes
        run: mvn --batch-mode --no-transfer-progress clean test

      - name: Publicar correção na branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickService.java \
            src/test/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickServiceTest.java \
            src/test/java/br/com/carlosdaniel/hokdraftcoach/service/IntegracaoDnaMotorDraftTest.java
          git commit -m "fix: support mirrored ranked bans across teams"
          git push origin HEAD:feat/backend-draft-engine

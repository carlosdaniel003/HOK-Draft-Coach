name: Temporary trigger live draft line breaks

on:
  push:
    branches:
      - feat/backend-draft-engine
    paths:
      - .github/workflows/temp-trigger-live-draft-line-breaks.yml

permissions:
  contents: write

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/backend-draft-engine
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Extrair e executar correção
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path(
              '.github/workflows/temp-fix-live-draft-line-breaks.yml'
          ).read_text(encoding='utf-8')
          marker = "          python3 - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("          PY\n", start)
          lines = workflow[start:end].splitlines()
          script = '\n'.join(
              line[10:] if line.startswith('          ') else line
              for line in lines
          ) + '\n'
          Path('/tmp/fix-line-breaks.py').write_text(script, encoding='utf-8')
          PY
          python3 /tmp/fix-line-breaks.py

      - name: Validar JavaScript
        run: node --check src/main/resources/static/js/next-pick.js

      - name: Executar testes Maven
        run: mvn --batch-mode --no-transfer-progress clean test

      - name: Publicar correção
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm \
            .github/workflows/temp-trigger-live-draft-line-breaks.yml \
            .github/workflows/temp-fix-live-draft-line-breaks.yml
          git add \
            src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickService.java \
            src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickDnaService.java \
            src/test/java/br/com/carlosdaniel/hokdraftcoach/service/IntegracaoDnaMotorDraftTest.java
          git commit -m "style: finalize live draft formatting"
          git push origin HEAD:feat/backend-draft-engine

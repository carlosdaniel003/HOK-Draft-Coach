name: Temporary run patch diagnostic

on:
  push:
    branches:
      - feat/backend-draft-engine
    paths:
      - .github/workflows/temp-run-patch-diagnostic.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/backend-draft-engine
          fetch-depth: 0
      - name: Extract and run patch script
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/temp-apply-live-draft-v2.yml').read_text(encoding='utf-8')
          start = workflow.index("          python3 - <<'PY'\n") + len("          python3 - <<'PY'\n")
          end = workflow.index("          PY\n", start)
          lines = workflow[start:end].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          Path('/tmp/live-draft-patch.py').write_text(script, encoding='utf-8')
          PY
          set +e
          python3 /tmp/live-draft-patch.py > live-draft-patch-output.txt 2>&1
          status=$?
          echo "status=$status" >> live-draft-patch-output.txt
          git reset --hard HEAD
          cp live-draft-patch-output.txt /tmp/live-draft-patch-output.txt
          cp /tmp/live-draft-patch-output.txt live-draft-patch-output.txt
      - name: Publish diagnostic output
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/temp-run-patch-diagnostic.yml
          git add live-draft-patch-output.txt
          git commit -m "chore: capture live draft patch output"
          git push origin HEAD:feat/backend-draft-engine

name: Java CI

on:
  push:
    branches:
      - main
      - feat/backend-draft-engine
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: java-ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: feat/backend-draft-engine
          fetch-depth: 0

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Aplicar funções explícitas por slot
        shell: bash
        run: python3 .github/scripts/apply-team-slot-roles.py

      - name: Corrigir captura da ordem alvo
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickDnaService.java")
          text = path.read_text(encoding="utf-8")
          old = '''        return new RecomendacaoProximoPickRequest(
              request.meuLado(),
              ordemAlvo,
              request.bansAzul(),
              request.bansVermelho(),
              request.picksAzul(),
              request.picksVermelho(),
              request.funcoesDaOrdem(ordemAlvo),
              request.funcoesAliadas().stream()
                  .filter(item -> !ordemAlvo.equals(item.ordem()))
                  .toList()
          );
          '''
          new = '''        Integer ordemAlvoFinal = ordemAlvo;
          return new RecomendacaoProximoPickRequest(
              request.meuLado(),
              ordemAlvoFinal,
              request.bansAzul(),
              request.bansVermelho(),
              request.picksAzul(),
              request.picksVermelho(),
              request.funcoesDaOrdem(ordemAlvoFinal),
              request.funcoesAliadas().stream()
                  .filter(item -> !ordemAlvoFinal.equals(item.ordem()))
                  .toList()
          );
          '''
          if old not in text:
              raise SystemExit("Bloco da ordem alvo não encontrado")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Validar JavaScript
        shell: bash
        run: |
          node --check src/main/resources/static/js/app.js
          node --check src/main/resources/static/js/ranked-mode.js
          node --check src/main/resources/static/js/next-pick.js
          node --check src/main/resources/static/js/team-roles.js
          grep -q '>Top Lane<' src/main/resources/static/index.html
          grep -q '>ADC<' src/main/resources/static/index.html
          grep -q '>Suporte<' src/main/resources/static/index.html

      - name: Compilar e executar testes
        shell: bash
        run: |
          set +e
          mvn --batch-mode --no-transfer-progress clean test > maven.log 2>&1
          echo "$?" > maven-status.txt
          exit 0

      - name: Publicar relatório Maven
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-test-report
          path: |
            maven.log
            maven-status.txt
            target/surefire-reports/
          if-no-files-found: warn
          retention-days: 7

      - name: Validar resultado
        shell: bash
        run: |
          status=$(cat maven-status.txt)

          if [ "$status" -ne 0 ]; then
            echo "Maven falhou. Últimas linhas do log:"
            tail -n 160 maven.log
            exit "$status"
          fi

          tail -n 40 maven.log

      - name: Construir imagem da Vercel
        run: docker build --file Dockerfile.vercel --tag hok-draft-coach:ci .

      - name: Iniciar contêiner e testar API
        shell: bash
        run: |
          docker run --detach \
            --name hok-draft-coach-ci \
            --env PORT=8080 \
            --publish 127.0.0.1:18080:8080 \
            hok-draft-coach:ci

          for tentativa in $(seq 1 45); do
            if curl --fail --silent http://127.0.0.1:18080/api/status > resposta-status.json; then
              cat resposta-status.json
              docker logs hok-draft-coach-ci
              docker rm --force hok-draft-coach-ci
              exit 0
            fi

            if ! docker inspect --format='{{.State.Running}}' hok-draft-coach-ci | grep -q true; then
              echo "O contêiner encerrou antes de responder."
              docker logs hok-draft-coach-ci
              docker rm --force hok-draft-coach-ci
              exit 1
            fi

            sleep 1
          done

          echo "O contêiner não respondeu dentro do limite."
          docker logs hok-draft-coach-ci
          docker rm --force hok-draft-coach-ci
          exit 1

      - name: Publicar funções por slot validadas
        if: github.event_name == 'push'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/main src/test docs

          if git diff --cached --quiet; then
            echo "Nenhuma alteração nova para publicar."
            exit 0
          fi

          git commit -m "feat: assign explicit roles to allied draft slots"
          git push origin HEAD:feat/backend-draft-engine

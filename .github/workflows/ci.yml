name: Java CI

on:
  push:
    branches:
      - feat/backend-draft-engine
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compilar e executar testes
        shell: bash
        run: |
          set +e
          mvn --batch-mode --no-transfer-progress clean test > maven.log 2>&1
          echo "$?" > maven-status.txt
          exit 0

      - name: Publicar relatório Maven
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-test-report
          path: |
            maven.log
            maven-status.txt
            target/surefire-reports/
          if-no-files-found: warn
          retention-days: 7

      - name: Validar resultado
        shell: bash
        run: |
          status=$(cat maven-status.txt)

          if [ "$status" -ne 0 ]; then
            echo "Maven falhou. Últimas linhas do log:"
            tail -n 120 maven.log
            exit "$status"
          fi

          tail -n 30 maven.log

name: Java CI

on:
  push:
    branches:
      - main
      - feat/backend-draft-engine
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: java-ci-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: feat/backend-draft-engine
          fetch-depth: 0

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Aplicar resposta progressiva temporária
        shell: bash
        run: python3 .github/scripts/apply-staged-recommendation.py

      - name: Compilar e executar testes
        shell: bash
        run: |
          set +e
          mvn --batch-mode --no-transfer-progress clean test > maven.log 2>&1
          echo "$?" > maven-status.txt
          exit 0

      - name: Publicar relatório Maven
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-test-report
          path: |
            maven.log
            maven-status.txt
            target/surefire-reports/
          if-no-files-found: warn
          retention-days: 7

      - name: Validar resultado
        shell: bash
        run: |
          status=$(cat maven-status.txt)

          if [ "$status" -ne 0 ]; then
            echo "Maven falhou. Últimas linhas do log:"
            tail -n 120 maven.log
            exit "$status"
          fi

          tail -n 30 maven.log

      - name: Construir imagem da Vercel
        run: docker build --file Dockerfile.vercel --tag hok-draft-coach:ci .

      - name: Iniciar contêiner e testar API
        shell: bash
        run: |
          docker run --detach \
            --name hok-draft-coach-ci \
            --env PORT=8080 \
            --publish 127.0.0.1:18080:8080 \
            hok-draft-coach:ci

          for tentativa in $(seq 1 45); do
            if curl --fail --silent http://127.0.0.1:18080/api/status > resposta-status.json; then
              cat resposta-status.json
              docker logs hok-draft-coach-ci
              docker rm --force hok-draft-coach-ci
              exit 0
            fi

            if ! docker inspect --format='{{.State.Running}}' hok-draft-coach-ci | grep -q true; then
              echo "O contêiner encerrou antes de responder."
              docker logs hok-draft-coach-ci
              docker rm --force hok-draft-coach-ci
              exit 1
            fi

            sleep 1
          done

          echo "O contêiner não respondeu dentro do limite."
          docker logs hok-draft-coach-ci
          docker rm --force hok-draft-coach-ci
          exit 1

      - name: Publicar resposta progressiva validada
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/main/java/br/com/carlosdaniel/hokdraftcoach/controller/DraftController.java \
            src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickDnaService.java \
            src/main/resources/static/js/next-pick.js \
            src/test/java/br/com/carlosdaniel/hokdraftcoach/controller/DraftControllerTest.java \
            src/test/java/br/com/carlosdaniel/hokdraftcoach/service/IntegracaoDnaMotorDraftTest.java

          if git diff --cached --quiet; then
            echo "Nenhuma alteração nova para publicar."
            exit 0
          fi

          git commit -m "perf: render quick pick before strategic analysis"
          git push origin HEAD:feat/backend-draft-engine

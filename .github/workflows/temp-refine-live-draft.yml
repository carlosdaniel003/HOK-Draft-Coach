name: Temporary refine live draft

on:
  push:
    branches:
      - feat/backend-draft-engine
    paths:
      - .github/workflows/temp-refine-live-draft.yml

permissions:
  contents: write

jobs:
  refine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/backend-draft-engine
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Refine reviewed implementation
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: esperado 1 bloco, encontrado {count}")
              return text.replace(old, new, 1)

          service_path = Path('src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickService.java')
          service = service_path.read_text(encoding='utf-8')

          service = replace_once(
              service,
              '''        Integer ordemAlvoAliada = proximaOrdemAliada(request);
          if (ordemAlvoAliada == null) {
              return semRecomendacao(
                  "EQUIPE_ALIADA_COMPLETA",
                  "Os cinco picks da sua equipe já foram registrados.",
                  request,
                  inferencia,
                  rodadaAtual.lado(),
                  rodadaAtual.slots(),
                  List.of("Acompanhe os picks inimigos restantes e o plano final da composição.")
              );
          }

          boolean recomendacaoParaUsuario = ordemAlvoAliada.equals(
              request.minhaOrdem()
          ) && !slotJaPreenchido(request);
          List<Rota> funcoesAlvo = recomendacaoParaUsuario
              ? request.funcoesPreferidas()
              : List.of();
          ''',
              '''        Integer ordemAlvoAliada = proximaOrdemAliada(request);
              if (ordemAlvoAliada == null) {
                  return semRecomendacao(
                      "EQUIPE_ALIADA_COMPLETA",
                      "Os cinco picks da sua equipe já foram registrados.",
                      request,
                      inferencia,
                      rodadaAtual.lado(),
                      rodadaAtual.slots(),
                      List.of(
                          "Acompanhe os picks inimigos restantes e o plano final da composição."
                      )
                  );
              }

              boolean recomendacaoParaUsuario = ordemAlvoAliada.equals(
                  request.minhaOrdem()
              ) && !slotJaPreenchido(request);
              List<Rota> funcoesAlvo = recomendacaoParaUsuario
                  ? request.funcoesPreferidas()
                  : List.of();
              ''',
              'Formatação da ordem aliada',
          )

          service = replace_once(
              service,
              '''        boolean ehMinhaVez = rodadaAtual.lado() == request.meuLado()
              && rodadaAtual.ordens().contains(request.minhaOrdem());
          boolean vezAliada = rodadaAtual.lado() == request.meuLado();
          String slotAlvo = request.meuLado().prefixoSlot() + ordemAlvoAliada;
          String estadoDraft = ehMinhaVez
              ? "MINHA_VEZ"
              : vezAliada
                  ? "VEZ_ALIADA"
                  : "AGUARDANDO_INIMIGO";
          String mensagem = switch (estadoDraft) {
              case "MINHA_VEZ" ->
                  "É sua vez. A melhor escolha agora é "
                      + principal.heroi() + ".";
              case "VEZ_ALIADA" ->
                  "É a vez da sua equipe. Para " + slotAlvo
                      + ", a melhor escolha é " + principal.heroi() + ".";
              default ->
                  "O inimigo está escolhendo. Planejamento para " + slotAlvo
                      + ": " + principal.heroi()
                      + " lidera entre as opções aliadas.";
          };

          return new RecomendacaoProximoPickResponse(
              VERSAO_MOTOR,
              estadoDraft,
          ''',
              '''        boolean vezAliada = rodadaAtual.lado() == request.meuLado();
              boolean ehMinhaVez = vezAliada && recomendacaoParaUsuario;
              String slotAlvo = request.meuLado().prefixoSlot() + ordemAlvoAliada;
              String estadoDraft = ehMinhaVez
                  ? "MINHA_VEZ"
                  : vezAliada
                      ? "VEZ_ALIADA"
                      : "AGUARDANDO_INIMIGO";
              String mensagem = switch (estadoDraft) {
                  case "MINHA_VEZ" ->
                      "É sua vez. A melhor escolha agora é "
                          + principal.heroi() + ".";
                  case "VEZ_ALIADA" ->
                      "É a vez da sua equipe. Para " + slotAlvo
                          + ", a melhor escolha é " + principal.heroi() + ".";
                  default ->
                      "O inimigo está escolhendo. Planejamento para "
                          + slotAlvo + ": " + principal.heroi()
                          + " lidera entre as opções aliadas.";
              };

              return new RecomendacaoProximoPickResponse(
                  VERSAO_MOTOR,
                  estadoDraft,
              ''',
              'Associação entre recomendação e slot do usuário',
          )

          service = replace_once(
              service,
              '''    private Integer proximaOrdemAliada(
              RecomendacaoProximoPickRequest request
          ) {
              Map<Integer, Long> preenchidos = mapaPicks(
                  picks(request, request.meuLado())
              );

              for (RodadaPick rodada : RODADAS) {
                  if (rodada.lado() != request.meuLado()) {
                      continue;
                  }
                  for (Integer ordem : rodada.ordens()) {
                      if (!preenchidos.containsKey(ordem)) {
                          return ordem;
                      }
                  }
              }

              return null;
          }
          ''',
              '''    private Integer proximaOrdemAliada(
              RecomendacaoProximoPickRequest request
          ) {
              Map<Integer, Long> preenchidos = mapaPicks(
                  picks(request, request.meuLado())
              );

              for (RodadaPick rodada : RODADAS) {
                  if (rodada.lado() != request.meuLado()) {
                      continue;
                  }
                  for (Integer ordem : rodada.ordens()) {
                      if (!preenchidos.containsKey(ordem)) {
                          return ordem;
                      }
                  }
              }

              return null;
          }
          ''',
              'Formatação do helper aliado',
          )
          service_path.write_text(service, encoding='utf-8')

          dna_path = Path('src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickDnaService.java')
          dna = dna_path.read_text(encoding='utf-8')
          dna = replace_once(
              dna,
              '''        RecomendacaoProximoPickRequest requestAlvo = requestParaProximoAliado(
              request
          );
          List<String> aliados = nomes(picksAliados(request));
          List<String> inimigos = nomes(picksInimigos(request));
          ContextoDraftResponse contexto = segurancaBlindPickService.contexto(
              requestAlvo
          );
          DiagnosticoComposicaoResponse diagnostico = aliados.isEmpty()
              ? null
              : dnaComposicaoService.diagnosticar(aliados, inimigos);

          RecomendacaoProximoPickResponse base = recomendacaoBase.recomendar(
              request
          );
          ''',
              '''        RecomendacaoProximoPickRequest requestAlvo =
              requestParaProximoAliado(request);
          List<String> aliados = nomes(picksAliados(request));
          List<String> inimigos = nomes(picksInimigos(request));
          ContextoDraftResponse contexto = segurancaBlindPickService.contexto(
              requestAlvo
          );
          DiagnosticoComposicaoResponse diagnostico = aliados.isEmpty()
              ? null
              : dnaComposicaoService.diagnosticar(aliados, inimigos);

          RecomendacaoProximoPickResponse base = recomendacaoBase.recomendar(
              request
          );
          ''',
              'Formatação do contexto DNA',
          )
          dna = replace_once(
              dna,
              '''        String mensagem = switch (base.estadoDraft()) {
              case "MINHA_VEZ" ->
                  "É sua vez. A melhor escolha geral é "
                      + principal.heroi()
                      + "; a resposta também inclui a opção mais segura e a de maior impacto.";
              case "VEZ_ALIADA" ->
                  "É a vez da sua equipe. " + principal.heroi()
                      + " é a melhor escolha geral para o próximo pick aliado.";
              case "AGUARDANDO_INIMIGO" ->
                  "O inimigo está escolhendo. " + principal.heroi()
                      + " lidera o planejamento para a próxima resposta aliada.";
              default -> base.mensagem();
          };
          ''',
              '''        String mensagem = switch (base.estadoDraft()) {
              case "MINHA_VEZ" ->
                  "É sua vez. A melhor escolha geral é "
                      + principal.heroi()
                      + "; a resposta também inclui a opção mais segura e a de maior impacto.";
              case "VEZ_ALIADA" ->
                  "É a vez da sua equipe. " + principal.heroi()
                      + " é a melhor escolha geral para o próximo pick aliado.";
              case "AGUARDANDO_INIMIGO" ->
                  "O inimigo está escolhendo. " + principal.heroi()
                      + " lidera o planejamento para a próxima resposta aliada.";
              default -> base.mensagem();
          };
          ''',
              'Formatação das mensagens DNA',
          )
          dna = replace_once(
              dna,
              '''    private RecomendacaoProximoPickRequest requestParaProximoAliado(
              RecomendacaoProximoPickRequest request
          ) {
              if (request.meuLado() == null) {
                  return request;
              }

              List<PickSemFuncaoRequest> aliados = picksAliados(request);
              Integer ordemAlvo = null;
              for (int ordem = 1; ordem <= 5; ordem += 1) {
                  int ordemAtual = ordem;
                  boolean preenchido = aliados.stream()
                      .anyMatch(pick -> pick.ordem().equals(ordemAtual));
                  if (!preenchido) {
                      ordemAlvo = ordem;
                      break;
                  }
              }

              if (ordemAlvo == null) {
                  return request;
              }

              boolean alvoEhUsuario = ordemAlvo.equals(request.minhaOrdem());
              return new RecomendacaoProximoPickRequest(
                  request.meuLado(),
                  ordemAlvo,
                  request.bansAzul(),
                  request.bansVermelho(),
                  request.picksAzul(),
                  request.picksVermelho(),
                  alvoEhUsuario ? request.funcoesPreferidas() : List.of()
              );
          }
          ''',
              '''    private RecomendacaoProximoPickRequest requestParaProximoAliado(
              RecomendacaoProximoPickRequest request
          ) {
              if (request.meuLado() == null) {
                  return request;
              }

              List<PickSemFuncaoRequest> aliados = picksAliados(request);
              Integer ordemAlvo = null;
              for (int ordem = 1; ordem <= 5; ordem += 1) {
                  int ordemAtual = ordem;
                  boolean preenchido = aliados.stream()
                      .anyMatch(pick -> pick.ordem().equals(ordemAtual));
                  if (!preenchido) {
                      ordemAlvo = ordem;
                      break;
                  }
              }

              if (ordemAlvo == null) {
                  return request;
              }

              boolean alvoEhUsuario = ordemAlvo.equals(request.minhaOrdem());
              return new RecomendacaoProximoPickRequest(
                  request.meuLado(),
                  ordemAlvo,
                  request.bansAzul(),
                  request.bansVermelho(),
                  request.picksAzul(),
                  request.picksVermelho(),
                  alvoEhUsuario ? request.funcoesPreferidas() : List.of()
              );
          }
          ''',
              'Formatação do helper DNA',
          )
          dna_path.write_text(dna, encoding='utf-8')

          test_path = Path('src/test/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickServiceTest.java')
          test = test_path.read_text(encoding='utf-8')
          test = replace_once(
              test,
              '''    void deveRecomendarHeroiQuandoForMinhaVez() {
          ''',
              '''    void devePriorizarPrimeiroSlotAliadoAbertoNaRodadaDupla() {
          ''',
              'Nome do teste da rodada dupla',
          )
          test = replace_once(
              test,
              '''        assertEquals("MINHA_VEZ", resposta.estadoDraft());
              assertTrue(resposta.ehMinhaVez());
              assertEquals("B3", resposta.meuSlot());
          ''',
              '''        assertEquals("VEZ_ALIADA", resposta.estadoDraft());
              assertFalse(resposta.ehMinhaVez());
              assertEquals("B3", resposta.meuSlot());
              assertTrue(resposta.mensagem().contains("B2"));
          ''',
              'Expectativa da rodada dupla',
          )
          test_path.write_text(test, encoding='utf-8')
          PY

      - name: Validate JavaScript
        run: node --check src/main/resources/static/js/next-pick.js

      - name: Run Maven tests
        run: mvn --batch-mode --no-transfer-progress clean test

      - name: Publish review refinements
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/temp-refine-live-draft.yml
          git add \
            src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickService.java \
            src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickDnaService.java \
            src/test/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickServiceTest.java
          git commit -m "fix: align allied recommendation with active slot"
          git push origin HEAD:feat/backend-draft-engine

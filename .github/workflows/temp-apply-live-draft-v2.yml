name: Temporary apply live draft v2

on:
  push:
    branches:
      - feat/backend-draft-engine
    paths:
      - .github/workflows/temp-apply-live-draft-v2.yml

permissions:
  contents: write

jobs:
  patch-test-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/backend-draft-engine
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Apply structural patch
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def sub_once(text, pattern, replacement, label, flags=0):
              compiled = re.compile(pattern, flags)
              updated, count = compiled.subn(lambda _: replacement, text, count=1)
              if count != 1:
                  raise SystemExit(f"{label}: esperado 1 bloco, encontrado {count}")
              return updated

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: esperado 1 bloco, encontrado {count}")
              return text.replace(old, new, 1)

          service_path = Path('src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickService.java')
          service = service_path.read_text(encoding='utf-8')

          service = sub_once(
              service,
              r'\n        if \(slotJaPreenchido\(request\)\) \{.*?\n        \}\n\n        EstadoRodada rodadaAtual',
              '\n        EstadoRodada rodadaAtual',
              'Remoção do encerramento após meu pick',
              re.S,
          )

          target_block = '''        Integer ordemAlvoAliada = proximaOrdemAliada(request);
          if (ordemAlvoAliada == null) {
              return semRecomendacao(
                  "EQUIPE_ALIADA_COMPLETA",
                  "Os cinco picks da sua equipe já foram registrados.",
                  request,
                  inferencia,
                  rodadaAtual.lado(),
                  rodadaAtual.slots(),
                  List.of("Acompanhe os picks inimigos restantes e o plano final da composição.")
              );
          }

          boolean recomendacaoParaUsuario = ordemAlvoAliada.equals(
              request.minhaOrdem()
          ) && !slotJaPreenchido(request);
          List<Rota> funcoesAlvo = recomendacaoParaUsuario
              ? request.funcoesPreferidas()
              : List.of();
          '''
          insert_pattern = re.compile(
              r'(        if \(rodadaAtual == null\) \{.*?        \}\n)\n        InferenciaEquipeResponse aliados = equipe\(',
              re.S,
          )
          match = insert_pattern.search(service)
          if not match:
              raise SystemExit('Inserção da ordem aliada: bloco não encontrado')
          service = service[:match.start()] + match.group(1) + '\n' + target_block + '\n        InferenciaEquipeResponse aliados = equipe(' + service[match.end():]

          service = sub_once(
              service,
              r'(inimigosSemFuncao,\n)\s*request\.funcoesPreferidas\(\)(\n\s*\)\))',
              'inimigosSemFuncao,\n                funcoesAlvo\n            ))',
              'Funções da recomendação aliada',
          )

          state_block = '''        boolean ehMinhaVez = rodadaAtual.lado() == request.meuLado()
              && rodadaAtual.ordens().contains(request.minhaOrdem());
          boolean vezAliada = rodadaAtual.lado() == request.meuLado();
          String slotAlvo = request.meuLado().prefixoSlot() + ordemAlvoAliada;
          String estadoDraft = ehMinhaVez
              ? "MINHA_VEZ"
              : vezAliada
                  ? "VEZ_ALIADA"
                  : "AGUARDANDO_INIMIGO";
          String mensagem = switch (estadoDraft) {
              case "MINHA_VEZ" ->
                  "É sua vez. A melhor escolha agora é "
                      + principal.heroi() + ".";
              case "VEZ_ALIADA" ->
                  "É a vez da sua equipe. Para " + slotAlvo
                      + ", a melhor escolha é " + principal.heroi() + ".";
              default ->
                  "O inimigo está escolhendo. Planejamento para " + slotAlvo
                      + ": " + principal.heroi()
                      + " lidera entre as opções aliadas.";
          };

          return new RecomendacaoProximoPickResponse(
              VERSAO_MOTOR,
              estadoDraft,'''
          service = sub_once(
              service,
              r'        boolean ehMinhaVez = rodadaAtual\.lado\(\) == request\.meuLado\(\).*?        return new RecomendacaoProximoPickResponse\(\n            VERSAO_MOTOR,\n            ehMinhaVez \? "MINHA_VEZ" : "PLANEJAMENTO",',
              state_block,
              'Estado contínuo do draft',
              re.S,
          )

          helper = '''    private Integer proximaOrdemAliada(
              RecomendacaoProximoPickRequest request
          ) {
              Map<Integer, Long> preenchidos = mapaPicks(
                  picks(request, request.meuLado())
              );

              for (RodadaPick rodada : RODADAS) {
                  if (rodada.lado() != request.meuLado()) {
                      continue;
                  }
                  for (Integer ordem : rodada.ordens()) {
                      if (!preenchidos.containsKey(ordem)) {
                          return ordem;
                      }
                  }
              }

              return null;
          }

          '''
          service = replace_once(
              service,
              '    private boolean slotJaPreenchido(\n',
              helper + '    private boolean slotJaPreenchido(\n',
              'Helper do próximo aliado',
          )
          service_path.write_text(service, encoding='utf-8')

          dna_path = Path('src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickDnaService.java')
          dna = dna_path.read_text(encoding='utf-8')
          dna_start = '''        RecomendacaoProximoPickRequest requestAlvo = requestParaProximoAliado(
              request
          );
          List<String> aliados = nomes(picksAliados(request));
          List<String> inimigos = nomes(picksInimigos(request));
          ContextoDraftResponse contexto = segurancaBlindPickService.contexto(
              requestAlvo
          );
          DiagnosticoComposicaoResponse diagnostico = aliados.isEmpty()
              ? null
              : dnaComposicaoService.diagnosticar(aliados, inimigos);

          RecomendacaoProximoPickResponse base = recomendacaoBase.recomendar(
              request
          );'''
          dna = sub_once(
              dna,
              r'        List<String> aliados = nomes\(picksAliados\(request\)\);.*?        RecomendacaoProximoPickResponse base = recomendacaoBase\.recomendar\(\n            request\n        \);',
              dna_start,
              'Contexto do próximo aliado no DNA',
              re.S,
          )
          dna = sub_once(
              dna,
              r'dnaPorRota,\n\s*request\n\s*\)\)',
              'dnaPorRota,\n                requestAlvo\n            ))',
              'Blind pick do aliado',
          )

          dna_message = '''        String mensagem = switch (base.estadoDraft()) {
              case "MINHA_VEZ" ->
                  "É sua vez. A melhor escolha geral é "
                      + principal.heroi()
                      + "; a resposta também inclui a opção mais segura e a de maior impacto.";
              case "VEZ_ALIADA" ->
                  "É a vez da sua equipe. " + principal.heroi()
                      + " é a melhor escolha geral para o próximo pick aliado.";
              case "AGUARDANDO_INIMIGO" ->
                  "O inimigo está escolhendo. " + principal.heroi()
                      + " lidera o planejamento para a próxima resposta aliada.";
              default -> base.mensagem();
          };'''
          dna = sub_once(
              dna,
              r'        String mensagem = switch \(base\.estadoDraft\(\)\) \{.*?        \};',
              dna_message,
              'Mensagens da rotação no DNA',
              re.S,
          )

          dna_helper = '''    private RecomendacaoProximoPickRequest requestParaProximoAliado(
              RecomendacaoProximoPickRequest request
          ) {
              if (request.meuLado() == null) {
                  return request;
              }

              List<PickSemFuncaoRequest> aliados = picksAliados(request);
              Integer ordemAlvo = null;
              for (int ordem = 1; ordem <= 5; ordem += 1) {
                  int ordemAtual = ordem;
                  boolean preenchido = aliados.stream()
                      .anyMatch(pick -> pick.ordem().equals(ordemAtual));
                  if (!preenchido) {
                      ordemAlvo = ordem;
                      break;
                  }
              }

              if (ordemAlvo == null) {
                  return request;
              }

              boolean alvoEhUsuario = ordemAlvo.equals(request.minhaOrdem());
              return new RecomendacaoProximoPickRequest(
                  request.meuLado(),
                  ordemAlvo,
                  request.bansAzul(),
                  request.bansVermelho(),
                  request.picksAzul(),
                  request.picksVermelho(),
                  alvoEhUsuario ? request.funcoesPreferidas() : List.of()
              );
          }

          '''
          dna = replace_once(
              dna,
              '    private List<PickSemFuncaoRequest> picksAliados(\n',
              dna_helper + '    private List<PickSemFuncaoRequest> picksAliados(\n',
              'Helper de contexto do DNA',
          )
          dna_path.write_text(dna, encoding='utf-8')

          js_path = Path('src/main/resources/static/js/next-pick.js')
          js = js_path.read_text(encoding='utf-8')
          agora_new = r'''function criarAbaAgora(resultado) {
              const diagnostico = resultado.diagnosticoComposicao;
              const opcoes = obterOpcoesEstrategicas(resultado);

              if (!resultado.recomendacaoPrincipal && opcoes.length === 0) {
                  return `
                      <div class="coach-vazio">
                          <strong>${escaparProximoPick(resultado.mensagem)}</strong>
                          <p>${mensagemEstadoVazio(resultado.estadoDraft)}</p>
                          ${criarAvisosProximoPick(resultado.avisos)}
                      </div>
                  `;
              }

              const necessidade = diagnostico?.necessidades?.[0];
              const ameacas = diagnostico?.analiseAmeacasInimigas;
              const maiorAmeaca = ameacas?.maiorAmeaca;
              const condicaoInimiga = diagnostico?.condicoesVitoriaInimigas
                  ?.find((condicao) => condicao.principal)
                  ?? diagnostico?.condicoesVitoriaInimigas?.[0];
              const contextoRotacao = obterContextoRotacao(resultado);
              const opcaoPrincipal = opcoes[0];

              return `
                  <div class="analysis-view">
                      ${criarResumoRotacao(contextoRotacao, resultado)}
                      <div class="analysis-summary-grid">
                          <article class="analysis-summary-card analysis-summary-card--need">
                              <span class="analysis-summary-card__eyebrow">NECESSIDADE PRINCIPAL</span>
                              <strong>${escaparProximoPick(necessidade?.titulo ?? "Aguardando mais picks aliados")}</strong>
                              <p>${escaparProximoPick(necessidade?.motivo ?? "O motor atualiza as necessidades conforme a composição é revelada.")}</p>
                          </article>
                          <article class="analysis-summary-card analysis-summary-card--threat">
                              <span class="analysis-summary-card__eyebrow">MAIOR AMEAÇA INIMIGA</span>
                              <strong>${escaparProximoPick(maiorAmeaca?.heroi ?? "Ainda não identificada")}</strong>
                              <p>${escaparProximoPick(maiorAmeaca?.motivos?.[0] ?? "Registre os picks inimigos para mapear ameaça, iniciador e habilitador.")}</p>
                          </article>
                      </div>
                      ${condicaoInimiga ? `
                          <article class="condition-card">
                              <span class="analysis-summary-card__eyebrow">CONDIÇÃO DE VITÓRIA INIMIGA</span>
                              <strong>${escaparProximoPick(condicaoInimiga.titulo)}</strong>
                              <p>${escaparProximoPick(condicaoInimiga.descricao)}</p>
                          </article>
                      ` : ""}
                      <section class="recommendation-zone">
                          <div class="recommendation-zone__header">
                              <span class="recommendation-zone__title">${contextoRotacao.ehMeuSlot ? "3 MELHORES OPÇÕES PARA VOCÊ" : "3 MELHORES OPÇÕES PARA O PRÓXIMO PICK ALIADO"}</span>
                              <small>${escaparProximoPick(resultado.contextoDraft?.prioridade ?? "As categorias mudam conforme a ordem do próximo pick aliado.")}</small>
                          </div>
                          <div class="recommendation-grid">${opcoes.map(criarCardOpcao).join("")}</div>
                      </section>
                      ${criarPrevisaoInimigaAgora(opcaoPrincipal, contextoRotacao)}
                      ${criarAlertasAgora(resultado)}
                  </div>
              `;
          }

          function obterOpcoesEstrategicas'''
          js = sub_once(js, r'function criarAbaAgora\(resultado\) \{.*?\n\}\n\nfunction obterOpcoesEstrategicas', agora_new, 'Aba Agora', re.S)

          helpers = r'''function obterContextoRotacao(resultado) {
              const lado = document.querySelector("#meu-lado")?.value;
              const ordemUsuario = Number(document.querySelector("#minha-ordem")?.value);
              const slotAliado = encontrarProximoSlotAliado(lado);
              const prefixoUsuario = LADOS[lado]?.prefixo;
              const slotUsuario = prefixoUsuario && ordemUsuario ? `${prefixoUsuario}${ordemUsuario}` : null;
              const ladoAtual = resultado.proximoLado === "AZUL" ? "Equipe Azul" : resultado.proximoLado === "VERMELHO" ? "Equipe Vermelha" : "A definir";
              return {
                  ladoAtual,
                  slotsAtuais: resultado.proximosSlots ?? [],
                  slotAliado,
                  ehMeuSlot: Boolean(slotAliado && slotAliado === slotUsuario),
                  inimigoEscolhendo: resultado.estadoDraft === "AGUARDANDO_INIMIGO"
              };
          }

          function encontrarProximoSlotAliado(lado) {
              if (!LADOS[lado] || !estado.picks[lado]) return null;
              for (const rodada of SEQUENCIA_PICKS) {
                  if (rodada.lado !== lado) continue;
                  for (const indice of rodada.indices) {
                      if (!estado.picks[lado][indice]) return `${LADOS[lado].prefixo}${indice + 1}`;
                  }
              }
              return null;
          }

          function criarResumoRotacao(contexto, resultado) {
              const acao = resultado.estadoDraft === "MINHA_VEZ" ? "Seu pick está aberto" : resultado.estadoDraft === "VEZ_ALIADA" ? "Sua equipe está escolhendo" : resultado.estadoDraft === "AGUARDANDO_INIMIGO" ? "A equipe inimiga está escolhendo" : formatarEstadoDraft(resultado.estadoDraft);
              const slots = contexto.slotsAtuais.length ? contexto.slotsAtuais.join(" · ") : "Nenhum slot aberto";
              return `
                  <section class="rotation-overview">
                      <article class="rotation-overview__item"><span>ROTAÇÃO ATUAL</span><strong>${escaparProximoPick(acao)}</strong><p>${escaparProximoPick(contexto.ladoAtual)} · ${escaparProximoPick(slots)}</p></article>
                      <article class="rotation-overview__item rotation-overview__item--ally"><span>RECOMENDAÇÃO ALIADA</span><strong>${escaparProximoPick(contexto.ehMeuSlot ? `Seu slot ${contexto.slotAliado}` : `Próximo aliado ${contexto.slotAliado ?? "—"}`)}</strong><p>${escaparProximoPick(resultado.mensagem)}</p></article>
                      <article class="rotation-overview__item rotation-overview__item--enemy"><span>LEITURA FUTURA</span><strong>Respostas inimigas calculadas</strong><p>O sistema simula counters, rotas abertas e o pior cenário após cada opção aliada.</p></article>
                  </section>
              `;
          }

          function criarPrevisaoInimigaAgora(opcao, contexto) {
              const projecao = opcao?.projecao ?? {};
              const respostas = projecao.respostasProvaveis ?? [];
              return `
                  <section class="enemy-forecast">
                      <div class="enemy-forecast__header"><div><span class="analysis-section__title">PICKS INIMIGOS PROVÁVEIS</span><strong>Após ${escaparProximoPick(opcao?.escolha?.heroi ?? "o pick aliado recomendado")}</strong></div><small>${contexto.inimigoEscolhendo ? "INIMIGO ESCOLHENDO AGORA" : "PRÓXIMA RESPOSTA INIMIGA"}</small></div>
                      <div class="enemy-forecast__grid">
                          ${respostas.slice(0, 3).map((resposta, indice) => `
                              <article class="enemy-forecast-card"><span class="enemy-forecast-card__rank">${indice + 1}</span><div><strong>${escaparProximoPick(resposta.heroi)}</strong><small>${nomeRotaProximoPick(resposta.rota)} · ${resposta.probabilidadeHeuristica}% provável</small><p>${escaparProximoPick(resposta.motivos?.[0] ?? `Impacto estimado de ${resposta.impactoContraNossaComposicao}/100 contra nossa composição.`)}</p></div></article>
                          `).join("") || criarLinhaVazia("Ainda não há informação suficiente para prever um herói inimigo específico.")}
                      </div>
                  </section>
              `;
          }

          function criarAbaComposicao(resultado) {
          '''
          js = replace_once(js, 'function criarAbaComposicao(resultado) {\n', helpers, 'Helpers visuais')

          projection_new = r'''function criarAbaProjecao(resultado) {
              const opcoes = obterOpcoesEstrategicas(resultado);
              if (opcoes.length === 0) return criarEstadoSemDiagnostico("As projeções aparecerão quando houver candidatos disponíveis para o próximo pick aliado.");
              const contexto = obterContextoRotacao(resultado);
              const principal = opcoes[0];
              const respostasPrincipais = principal?.projecao?.respostasProvaveis ?? [];
              return `
                  <div class="analysis-view">
                      <section class="projection-flow">
                          <article class="projection-flow__step projection-flow__step--ally"><span>1 · PICK ALIADO</span><strong>${escaparProximoPick(principal?.escolha?.heroi ?? "—")}</strong><p>${escaparProximoPick(contexto.slotAliado ?? "Próximo slot aliado")}</p></article>
                          <article class="projection-flow__step projection-flow__step--enemy"><span>2 · RESPOSTAS INIMIGAS</span><strong>${respostasPrincipais.length} cenários principais</strong><p>${respostasPrincipais.slice(0, 2).map((item) => item.heroi).join(" · ") || "Aguardando informação"}</p></article>
                          <article class="projection-flow__step projection-flow__step--risk"><span>3 · PIOR CENÁRIO</span><strong>${principal?.projecao?.piorCenarioProjetado ?? 0}/100</strong><p>Robustez ${principal?.projecao?.robustez ?? 0}/100</p></article>
                      </section>
                      <article class="condition-card"><span class="analysis-summary-card__eyebrow">SIMULAÇÃO DOS PRÓXIMOS PICKS</span><strong>Aliado recomendado, respostas inimigas e pior cenário</strong><p>Para cada opção aliada, o motor projeta os heróis inimigos mais prováveis pelas rotas abertas, capacidade de counter, condição de vitória e impacto contra nosso DNA.</p></article>
                      <section>${opcoes.map((opcao, indice) => criarBlocoProjecao(opcao, indice)).join("")}</section>
                  </div>
              `;
          }

          function criarBlocoProjecao'''
          js = sub_once(js, r'function criarAbaProjecao\(resultado\) \{.*?\n\}\n\nfunction criarBlocoProjecao', projection_new, 'Aba Projeção', re.S)

          block_new = r'''function criarBlocoProjecao(opcao, indice) {
              const projecao = opcao.projecao ?? {};
              const respostas = projecao.respostasProvaveis ?? [];
              return `
                  <article class="projection-option">
                      <div class="projection-option__header"><div><span class="analysis-summary-card__eyebrow">${escaparProximoPick(opcao.titulo)}</span><h3>${escaparProximoPick(opcao.escolha?.heroi ?? "—")}</h3><small class="projection-option__slot">Próximo pick aliado</small></div><div class="projection-score"><strong>${projecao.robustez ?? 0}/100</strong><small>ROBUSTEZ</small></div></div>
                      <div class="projection-list">
                          ${respostas.map((resposta, respostaIndice) => `
                              <article class="projection-answer"><div class="projection-answer__top"><strong>${respostaIndice + 1}. ${escaparProximoPick(resposta.heroi)} · ${nomeRotaProximoPick(resposta.rota)}</strong><small>${resposta.probabilidadeHeuristica}% provável</small></div><p>Impacto contra nossa composição: ${resposta.impactoContraNossaComposicao}/100 · Pontuação inimiga: ${resposta.pontuacaoInimiga}/100.</p>${(resposta.motivos ?? []).length ? `<ul class="projection-answer__reasons">${resposta.motivos.slice(0, 2).map((motivo) => `<li>${escaparProximoPick(motivo)}</li>`).join("")}</ul>` : ""}</article>
                          `).join("") || criarLinhaVazia("Nenhuma resposta futura específica foi identificada neste estado.")}
                      </div>
                      <div class="projection-option__worst-case"><strong>Pior cenário projetado: ${projecao.piorCenarioProjetado ?? 0}/100</strong><p>${escaparProximoPick(projecao.resumoPiorCenario ?? "")}</p></div>
                      <button class="pick-option-card__button" type="button" data-option-details="${indice}" style="margin-top:10px">Ver análise completa</button>
                  </article>
              `;
          }

          function registrarEventosDetalhes'''
          js = sub_once(js, r'function criarBlocoProjecao\(opcao, indice\) \{.*?\n\}\n\nfunction registrarEventosDetalhes', block_new, 'Blocos da Projeção', re.S)
          js = replace_once(js, '        PICK_JA_REALIZADO: "Seu pick já foi registrado. Continue preenchendo o draft para acompanhar o plano final.",\n', '        PICK_JA_REALIZADO: "Seu pick já foi registrado. O motor continuará recomendando os próximos picks aliados.",\n        EQUIPE_ALIADA_COMPLETA: "Os picks aliados terminaram. Continue registrando o inimigo para concluir a leitura.",\n', 'Mensagem de pick registrado')
          js = replace_once(js, '        MINHA_VEZ: "Sua vez",\n        PLANEJAMENTO: "Planejamento",\n', '        MINHA_VEZ: "Sua vez",\n        VEZ_ALIADA: "Vez aliada",\n        AGUARDANDO_INIMIGO: "Inimigo escolhendo",\n        PLANEJAMENTO: "Planejamento",\n', 'Estados da interface')
          js = replace_once(js, '        DRAFT_CONCLUIDO: "Draft concluído",\n', '        DRAFT_CONCLUIDO: "Draft concluído",\n        EQUIPE_ALIADA_COMPLETA: "Equipe aliada completa",\n', 'Estado aliado completo')
          js_path.write_text(js, encoding='utf-8')

          css_path = Path('src/main/resources/static/css/next-pick.css')
          css = css_path.read_text(encoding='utf-8')
          css = replace_once(css, '.coach-status--planejamento,\n.coach-status--carregando {\n', '.coach-status--planejamento,\n.coach-status--vez-aliada,\n.coach-status--carregando {\n', 'Status aliado')
          css = replace_once(css, '.coach-status--fase-de-bans,\n', '.coach-status--aguardando-inimigo {\n    color: #ff8b9a;\n    background: rgba(255, 75, 100, 0.1);\n}\n\n.coach-status--fase-de-bans,\n', 'Status inimigo')
          css_extra = '''
          .rotation-overview,
          .projection-flow { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
          .rotation-overview__item,
          .projection-flow__step,
          .enemy-forecast { border: 1px solid #223651; border-radius: 9px; background: rgba(11, 24, 43, 0.76); }
          .rotation-overview__item,
          .projection-flow__step { min-width: 0; padding: 11px; }
          .rotation-overview__item > span,
          .projection-flow__step > span { display: block; margin-bottom: 6px; color: #7f8fa5; font-size: 0.48rem; font-weight: 900; letter-spacing: 0.06em; }
          .rotation-overview__item strong,
          .projection-flow__step strong { display: block; margin-bottom: 5px; color: #e9f1fa; font-size: 0.72rem; }
          .rotation-overview__item p,
          .projection-flow__step p { color: #8191a7; font-size: 0.56rem; line-height: 1.42; }
          .rotation-overview__item--ally,
          .projection-flow__step--ally { border-color: rgba(66, 157, 255, 0.34); background: rgba(35, 93, 160, 0.14); }
          .rotation-overview__item--ally strong,
          .projection-flow__step--ally strong { color: #72b7ff; }
          .rotation-overview__item--enemy,

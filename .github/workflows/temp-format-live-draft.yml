name: Temporary format live draft changes

on:
  push:
    branches:
      - feat/backend-draft-engine
    paths:
      - .github/workflows/temp-format-live-draft.yml

permissions:
  contents: write

jobs:
  format-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/backend-draft-engine
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Download Java formatter
        shell: bash
        run: |
          curl --fail --location --silent --show-error \
            https://github.com/google/google-java-format/releases/download/v1.24.0/google-java-format-1.24.0-all-deps.jar \
            --output /tmp/google-java-format.jar

      - name: Format only reviewed regions
        shell: bash
        run: |
          java -jar /tmp/google-java-format.jar --replace \
            --lines 120:280 \
            --lines 870:940 \
            src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickService.java

          java -jar /tmp/google-java-format.jar --replace \
            --lines 55:165 \
            --lines 535:610 \
            src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickDnaService.java

          java -jar /tmp/google-java-format.jar --replace \
            --lines 35:100 \
            src/test/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickServiceTest.java

          java -jar /tmp/google-java-format.jar --replace \
            --lines 120:230 \
            src/test/java/br/com/carlosdaniel/hokdraftcoach/service/IntegracaoDnaMotorDraftTest.java

      - name: Validate JavaScript
        run: node --check src/main/resources/static/js/next-pick.js

      - name: Run Maven tests
        run: mvn --batch-mode --no-transfer-progress clean test

      - name: Publish formatted review
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/temp-format-live-draft.yml
          git add \
            src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickService.java \
            src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickDnaService.java \
            src/test/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickServiceTest.java \
            src/test/java/br/com/carlosdaniel/hokdraftcoach/service/IntegracaoDnaMotorDraftTest.java
          if git diff --cached --quiet; then
            git commit --allow-empty -m "chore: complete live draft review"
          else
            git commit -m "style: normalize live draft modules"
          fi
          git push origin HEAD:feat/backend-draft-engine

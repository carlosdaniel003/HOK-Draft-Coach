name: Temporary fix live draft line breaks

on:
  push:
    branches:
      - feat/backend-draft-engine
    paths:
      - .github/workflows/temp-fix-live-draft-line-breaks.yml

permissions:
  contents: write

jobs:
  fix-test-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/backend-draft-engine
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Corrigir junções e testes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def trocar(texto, antigo, novo, rotulo):
              if texto.count(antigo) != 1:
                  raise SystemExit(
                      f"{rotulo}: encontrado {texto.count(antigo)} vez(es)"
                  )
              return texto.replace(antigo, novo, 1)

          service_path = Path(
              "src/main/java/br/com/carlosdaniel/hokdraftcoach/service/"
              "RecomendacaoProximoPickService.java"
          )
          service = service_path.read_text(encoding="utf-8")
          service = trocar(
              service,
              "        }        Integer ordemAlvoAliada",
              "        }\n\n        Integer ordemAlvoAliada",
              "Separação da ordem aliada"
          )
          service = trocar(
              service,
              "            .toList();        boolean vezAliada",
              "            .toList();\n\n        boolean vezAliada",
              "Separação do estado aliado"
          )
          service = trocar(
              service,
              "        return null;\n    }    private Integer proximaOrdemAliada",
              "        return null;\n    }\n\n    private Integer proximaOrdemAliada",
              "Separação do helper aliado"
          )
          service_path.write_text(service, encoding="utf-8")

          dna_path = Path(
              "src/main/java/br/com/carlosdaniel/hokdraftcoach/service/"
              "RecomendacaoProximoPickDnaService.java"
          )
          dna = dna_path.read_text(encoding="utf-8")
          dna = trocar(
              dna,
              "    ) {        RecomendacaoProximoPickRequest requestAlvo =",
              "    ) {\n        RecomendacaoProximoPickRequest requestAlvo =",
              "Separação do início do DNA"
          )
          dna = trocar(
              dna,
              "            .toList();        String mensagem",
              "            .toList();\n\n        String mensagem",
              "Separação da mensagem DNA"
          )
          dna = trocar(
              dna,
              "        );\n    }    private RecomendacaoProximoPickRequest",
              "        );\n    }\n\n    private RecomendacaoProximoPickRequest",
              "Separação do helper DNA"
          )
          dna_path.write_text(dna, encoding="utf-8")

          integration_path = Path(
              "src/test/java/br/com/carlosdaniel/hokdraftcoach/service/"
              "IntegracaoDnaMotorDraftTest.java"
          )
          integration = integration_path.read_text(encoding="utf-8")

          testes = (
              "    @Test\n"
              "    void deveProjetarRespostasInimigasDesdeOPrimeiroPick() {\n"
              "        RecomendacaoProximoPickRequest request =\n"
              "            new RecomendacaoProximoPickRequest(\n"
              "                LadoDraft.AZUL,\n"
              "                1,\n"
              "                List.of(1L, 2L, 3L),\n"
              "                List.of(1L, 4L, 5L),\n"
              "                List.of(),\n"
              "                List.of(),\n"
              "                List.of(Rota.ROAMING)\n"
              "            );\n\n"
              "        RecomendacaoProximoPickResponse resposta =\n"
              "            proximoPickDnaService.recomendar(request);\n\n"
              "        assertEquals(\"MINHA_VEZ\", resposta.estadoDraft());\n"
              "        assertNotNull(resposta.recomendacaoPrincipal());\n"
              "        assertEquals(3, resposta.opcoesEstrategicas().size());\n"
              "        assertTrue(\n"
              "            resposta.opcoesEstrategicas().stream().allMatch(\n"
              "                opcao -> opcao.projecao() != null\n"
              "                    && !opcao.projecao().respostasProvaveis().isEmpty()\n"
              "            )\n"
              "        );\n"
              "    }\n\n"
              "    @Test\n"
              "    void deveManterDnaEProjecoesDepoisDoPickDoUsuario() {\n"
              "        RecomendacaoProximoPickRequest request =\n"
              "            new RecomendacaoProximoPickRequest(\n"
              "                LadoDraft.AZUL,\n"
              "                1,\n"
              "                List.of(1L, 2L, 3L),\n"
              "                List.of(1L, 4L, 5L),\n"
              "                List.of(new PickSemFuncaoRequest(1, 7L)),\n"
              "                List.of(\n"
              "                    new PickSemFuncaoRequest(1, 31L),\n"
              "                    new PickSemFuncaoRequest(2, 17L)\n"
              "                ),\n"
              "                List.of(Rota.ROAMING)\n"
              "            );\n\n"
              "        RecomendacaoProximoPickResponse resposta =\n"
              "            proximoPickDnaService.recomendar(request);\n\n"
              "        assertEquals(\"VEZ_ALIADA\", resposta.estadoDraft());\n"
              "        assertNotNull(resposta.recomendacaoPrincipal());\n"
              "        assertEquals(3, resposta.opcoesEstrategicas().size());\n"
              "        assertTrue(resposta.opcoesEstrategicas().stream().allMatch(\n"
              "            opcao -> opcao.projecao() != null\n"
              "        ));\n"
              "    }\n\n"
              "    @Test\n"
              "    void deveProjetarRespostasEOferecerTresOpcoesExplicadas() {"
          )

          integration, quantidade = re.subn(
              r"\s*@Test\s*void "
              r"deveProjetarRespostasInimigasDesdeOPrimeiroPick\(\) \{"
              r".*?\s*@Test\s*void "
              r"deveProjetarRespostasEOferecerTresOpcoesExplicadas\(\) \{",
              lambda _: "\n\n" + testes,
              integration,
              count=1,
              flags=re.S
          )
          if quantidade != 1:
              raise SystemExit(
                  f"Testes integrados: esperado 1 bloco, encontrado {quantidade}"
              )
          integration_path.write_text(integration, encoding="utf-8")
          PY

      - name: Validar JavaScript
        run: node --check src/main/resources/static/js/next-pick.js

      - name: Executar testes Maven
        run: mvn --batch-mode --no-transfer-progress clean test

      - name: Publicar correção final
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/temp-fix-live-draft-line-breaks.yml
          git add \
            src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickService.java \
            src/main/java/br/com/carlosdaniel/hokdraftcoach/service/RecomendacaoProximoPickDnaService.java \
            src/test/java/br/com/carlosdaniel/hokdraftcoach/service/IntegracaoDnaMotorDraftTest.java
          git commit -m "style: finalize live draft formatting"
          git push origin HEAD:feat/backend-draft-engine
